<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <div id="header">
      <h1>GN Tracing</h1>
      <div id="status-bar" class="hidden">
        <span id="recording-indicator"></span>
        <span id="timer">00:00</span>
      </div>
    </div>

    <button id="toggle-btn" class="btn btn-start">Start Recording</button>

    <div id="stats" class="hidden">
      <div class="stat-row">
        <span class="stat-label">Console</span>
        <span id="console-count" class="stat-value">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Network</span>
        <span id="network-count" class="stat-value">0</span>
      </div>
    </div>

    <div id="download-section" class="hidden">
      <button id="upload-drive-btn" class="btn btn-upload">Upload to Google Drive</button>
      <div id="upload-progress" class="hidden">
        <div class="progress-bar-container">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
        <div id="progress-text" class="progress-text">Uploading...</div>
        <div id="progress-meta" class="progress-meta">0 B / 0 B (0.0%)</div>
        <div id="upload-items" class="progress-items"></div>
      </div>
    </div>

    <div id="upload-result" class="hidden">
      <div id="link-container">
        <input type="text" id="recording-link" readonly>
        <button id="copy-link-btn">Copy</button>
        <button id="open-link-btn">Open</button>
      </div>
      <span id="copy-feedback" class="hidden">Copied!</span>
    </div>

    <div id="google-drive-section">
      <div class="setting-row">
        <label>Google Drive</label>
        <div id="google-drive-status">Not connected</div>
        <button id="google-drive-connect-btn" class="btn btn-small">Connect</button>
        <button id="google-drive-disconnect-btn" class="btn btn-small hidden">Disconnect</button>
      </div>
    </div>

    <div id="community-section">
      <div class="community-copy">
        <div class="community-title">Help improve GN Tracing</div>
        <p class="community-text">
          Star the repo, report bugs, or open a PR if you want to make the player and recorder better.
        </p>
      </div>
      <div class="community-actions">
        <button id="github-link-btn" class="btn btn-secondary" type="button">GitHub</button>
        <button id="contribute-link-btn" class="btn btn-secondary" type="button">Contribute</button>
      </div>
    </div>

    <div id="error-msg" class="hidden"></div>
  </div>
  <script src="./popup.js"></script>
</body>
</html>
